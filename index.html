<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - AresHydra & Friends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Photo Gallery</h1>
            <p>Memories with friends</p>
        </header>

        <div class="gallery">
            <div class="photo-card">
                <img src="https://via.placeholder.com/300?text=Photo+1" alt="Photo 1">
                <p>Add your photos here!</p>
            </div>
            <div class="photo-card">
                <img src="https://via.placeholder.com/300?text=Photo+2" alt="Photo 2">
                <p>Replace placeholder URLs with your images</p>
            </div>
            <div class="photo-card">
                <img src="https://via.placeholder.com/300?text=Photo+3" alt="Photo 3">
                <p>See README.md for instructions</p>
            </div>
            <div class="photo-card">
                <img src="https://via.placeholder.com/300?text=Photo+4" alt="Photo 4">
                <p>Add more photo cards as needed</p>
            </div>
        </div>

        <footer>
            <p>Made with ❤️ by AresHydra & Friends</p>
        </footer>
    </div>
</body>
</html>
